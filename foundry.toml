[profile.default]
src = "src"
out = "out"
libs = ["lib"]

remappings = [
    # ── typed-uniswap-v4 ──
    "@typed-v4/=lib/typed-uniswap-v4/src/",
    "@libraries/=lib/2025-12-panoptic/contracts/libraries/",

    "@types/=lib/2025-12-panoptic/contracts/types/",

    # ── solady (via bunni-v2) ──
    "@solady/=lib/bunni-v2/lib/solady/src/"
]
# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
